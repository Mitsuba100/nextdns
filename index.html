<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextDNS Multi-Network Profile Generator</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background: #f5f5f7; 
            color: #1d1d1f; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 500px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            box-sizing: border-box;
        }
        h2 { 
            margin-top: 0; 
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: #000;
        }
        p {
            color: #86868b;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            border-bottom: 1px solid #d2d2d7;
            padding-bottom: 6px;
            margin-top: 20px;
            color: #0071e3;
        }
        label { 
            display: block; 
            margin: 12px 0 4px; 
            font-weight: 600; 
            font-size: 13px; 
        }
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #d2d2d7; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background-color: #f5f5f7;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: #0071e3;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }
        button { 
            width: 100%; 
            background: #0071e3; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            margin-top: 24px; 
            cursor: pointer; 
            transition: background 0.2s ease;
        }
        button:hover { 
            background: #0077ed; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Profile Builder</h2>
    <p>Generate a dual-network configuration profile for your iPad.</p>
    
    <div class="section-title">1. Other Wi-Fi (NextDNS DoH Setup)</div>
    
    <label for="otherSsid">Other Wi-Fi SSID (Name)</label>
    <input type="text" id="otherSsid" value="">

    <label for="configId">NextDNS Configuration ID</label>
    <input type="text" id="configId" value="">

    <label for="deviceName">Device Name</label>
    <input type="text" id="deviceName" value="">

    <label for="dohIpv4_1">DoH IPv4 Primary Address</label>
    <input type="text" id="dohIpv4_1" value="">

    <label for="dohIpv4_2">DoH IPv4 Secondary Address</label>
    <input type="text" id="dohIpv4_2" value="">

    <label for="dohIpv6_1">DoH IPv6 Primary Address</label>
    <input type="text" id="dohIpv6_1" value="">

    <label for="dohIpv6_2">DoH IPv6 Secondary Address</label>
    <input type="text" id="dohIpv6_2" value="">

    <div class="section-title">2. GLAP-Schule (Forced Static DNS)</div>

    <label for="schoolIpv4_1">GLAP-Schule Forced DNS 1</label>
    <input type="text" id="schoolIpv4_1" value="">

    <label for="schoolIpv4_2">GLAP-Schule Forced DNS 2</label>
    <input type="text" id="schoolIpv4_2" value="">

    <button onclick="generateProfile()">Download Profile</button>
</div>

<script>
function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16).toUpperCase();
    });
}

function generateProfile() {
    const otherSsid = document.getElementById('otherSsid').value.trim();
    const configId = document.getElementById('configId').value.trim();
    const deviceNameRaw = document.getElementById('deviceName').value.trim();
    const deviceName = encodeURIComponent(deviceNameRaw || "iPad");
    
    const dohIpv4_1 = document.getElementById('dohIpv4_1').value.trim();
    const dohIpv4_2 = document.getElementById('dohIpv4_2').value.trim();
    const dohIpv6_1 = document.getElementById('dohIpv6_1').value.trim();
    const dohIpv6_2 = document.getElementById('dohIpv6_2').value.trim();

    const schoolIpv4_1 = document.getElementById('schoolIpv4_1').value.trim();
    const schoolIpv4_2 = document.getElementById('schoolIpv4_2').value.trim();

    // Basic Validation
    if (!otherSsid) {
        alert("Please enter the name (SSID) of your Other Wi-Fi network.");
        return;
    }
    if (!configId) {
        alert("Please enter your NextDNS Configuration ID.");
        return;
    }
    if (!dohIpv4_1 || !dohIpv4_2) {
        alert("Please enter both DoH IPv4 Addresses.");
        return;
    }
    if (!schoolIpv4_1 || !schoolIpv4_2) {
        alert("Please enter both GLAP-Schule Forced DNS Addresses.");
        return;
    }

    const dnsUuid = generateUUID();
    const schoolWifiUuid = generateUUID();
    const generalWifiUuid = generateUUID();
    const mainUuid = generateUUID();

    const profileXml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>PayloadContent</key>
	<array>
		<dict>
			<key>PayloadType</key>
			<string>com.apple.dnsSettings.managed</string>
			<key>PayloadVersion</key>
			<integer>1</integer>
			<key>PayloadUUID</key>
			<string>${dnsUuid}</string>
			<key>PayloadIdentifier</key>
			<string>net.stuple.profile.dns</string>
			<key>PayloadDisplayName</key>
			<string>NextDNS Settings</string>
			<key>DNSSettings</key>
			<dict>
				<key>DNSProtocol</key>
				<string>HTTPS</string>
				<key>ServerURL</key>
				<string>https://apple.dns.nextdns.io/${configId}/${deviceName}</string>
				<key>ServerAddresses</key>
				<array>
					<string>${dohIpv4_1}</string>
					<string>${dohIpv4_2}</string>
					${dohIpv6_1 ? `<string>${dohIpv6_1}</string>` : ''}
					${dohIpv6_2 ? `<string>${dohIpv6_2}</string>` : ''}
				</array>
				<key>OnDemandRules</key>
				<array>
					<dict>
						<key>Action</key>
						<string>Disconnect</string>
						<key>SSIDMatch</key>
						<array>
							<string>GLAP-Schule</string>
						</array>
					</dict>
					<dict>
						<key>Action</key>
						<string>Connect</string>
					</dict>
				</array>
			</dict>
		</dict>

		<dict>
			<key>PayloadType</key>
			<string>com.apple.WiFi</string>
			<key>PayloadVersion</key>
			<integer>1</integer>
			<key>PayloadUUID</key>
			<string>${schoolWifiUuid}</string>
			<key>PayloadIdentifier</key>
			<string>net.stuple.profile.wifischool</string>
			<key>PayloadDisplayName</key>
			<string>GLAP-Schule Wi-Fi</string>
			<key>SSID_STR</key>
			<string>GLAP-Schule</string>
			<key>HIDDEN_NETWORK</key>
			<false/>
			<key>AutoJoin</key>
			<true/>
			<key>EncryptionType</key>
			<string>WPA</string>
			<key>CaptiveBypass</key>
			<false/>
			<key>DNSNameservers</key>
			<array>
				<string>${schoolIpv4_1}</string>
				<string>${schoolIpv4_2}</string>
			</array>
		</dict>

		<dict>
			<key>PayloadType</key>
			<string>com.apple.WiFi</string>
			<key>PayloadVersion</key>
			<integer>1</integer>
			<key>PayloadUUID</key>
			<string>${generalWifiUuid}</string>
			<key>PayloadIdentifier</key>
			<string>net.stuple.profile.wifigeneral</string>
			<key>PayloadDisplayName</key>
			<string>${otherSsid} Wi-Fi</string>
			<key>SSID_STR</key>
			<string>${otherSsid}</string>
			<key>HIDDEN_NETWORK</key>
			<false/>
			<key>AutoJoin</key>
			<true/>
			<key>EncryptionType</key>
			<string>WPA</string>
		</dict>
	</array>
	<key>PayloadDescription</key>
	<string>NextDNS Setup: Custom Wi-Fi Bypass config.</string>
	<key>PayloadDisplayName</key>
	<string>Stuple Multi-Network Config</string>
	<key>PayloadIdentifier</key>
	<string>net.stuple.profile</string>
	<key>PayloadOrganization</key>
	<string>Stuple</string>
	<key>PayloadRemovalDisallowed</key>
	<false/>
	<key>PayloadScope</key>
	<string>System</string>
	<key>PayloadType</key>
	<string>Configuration</string>
	<key>PayloadUUID</key>
	<string>${mainUuid}</string>
	<key>PayloadVersion</key>
	<integer>1</integer>
</dict>
</plist>`;

    const blob = new Blob([profileXml], { type: 'application/x-apple-aspen-config' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `MultiNetwork-NextDNS.mobileconfig`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
