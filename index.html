<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextDNS Profile Generator</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 20px; 
            background: #f5f5f7; 
            color: #1d1d1f; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 480px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            box-sizing: border-box;
        }
        h2 { 
            margin-top: 0; 
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: #000;
        }
        p {
            color: #86868b;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        label { 
            display: block; 
            margin: 14px 0 6px; 
            font-weight: 600; 
            font-size: 14px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #d2d2d7; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #f5f5f7;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: #0071e3;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }
        button { 
            width: 100%; 
            background: #0071e3; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            margin-top: 24px; 
            cursor: pointer; 
            transition: background 0.2s ease;
        }
        button:hover { 
            background: #0077ed; 
        }
    </style>
</head>
<body>

<div class="card">
    <h2>NextDNS Profile Builder</h2>
    <p>Generate a custom Apple configuration profile bypassable on <b>GLAP-Schule</b> Wi-Fi with NextDNS Root CA preloaded.</p>
    
    <label for="configId">NextDNS Configuration ID</label>
    <input type="text" id="configId" value="">

    <label for="deviceName">Device Name</label>
    <input type="text" id="deviceName" value="">

    <label for="ipv4_1">IPv4 Primary Address</label>
    <input type="text" id="ipv4_1" value="">

    <label for="ipv4_2">IPv4 Secondary Address</label>
    <input type="text" id="ipv4_2" value="">

    <label for="ipv6_1">IPv6 Primary Address</label>
    <input type="text" id="ipv6_1" value="">

    <label for="ipv6_2">IPv6 Secondary Address</label>
    <input type="text" id="ipv6_2" value="">

    <button onclick="generateProfile()">Download Profile</button>
</div>

<script>
function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16).toUpperCase();
    });
}

function generateProfile() {
    const configId = document.getElementById('configId').value.trim();
    const deviceNameRaw = document.getElementById('deviceName').value.trim();
    const deviceName = encodeURIComponent(deviceNameRaw || "iPad");
    const ipv4_1 = document.getElementById('ipv4_1').value.trim();
    const ipv4_2 = document.getElementById('ipv4_2').value.trim();
    const ipv6_1 = document.getElementById('ipv6_1').value.trim();
    const ipv6_2 = document.getElementById('ipv6_2').value.trim();

    // Field verification to prevent compiling broken files
    if (!configId) {
        alert("Please enter a Configuration ID.");
        return;
    }
    if (!ipv4_1 || !ipv4_2) {
        alert("Please enter both IPv4 Addresses.");
        return;
    }

    const certUuid = generateUUID();

			<string>${dnsUuid}</string>
			<key>PayloadIdentifier</key>
			<string>net.stuple.profile.dns</string>
			<key>PayloadDisplayName</key>
			<string>NextDNS Settings</string>
			<key>DNSSettings</key>
			<dict>
				<key>DNSProtocol</key>

				<key>ServerURL</key>
				<string>https://apple.dns.nextdns.io/${configId}/${deviceName}</string>
				<key>ServerAddresses</key>
				<array>
					<string>${ipv4_1}</string>
					<string>${ipv4_2}</string>

			<string>${certUuid}</string>
			<key>PayloadIdentifier</key>

			<key>PayloadContent</key>
			<data>
			MIIChjCCAiWgAwIBAgIQY9Fs3R0I3s7B8F9A/762izAKBggqhkjOPQQDAjAl

			E8p76F==
			</data>
		</dict>
	</array>
	<key>PayloadDescription</key>
	<string>NextDNS Setup with School Wi-Fi Bypass and Certificate Integration.</string>
	<key>PayloadDisplayName</key>
	<string>Stuple NextDNS (${decodeURIComponent(deviceName)})</string>
	<key>PayloadIdentifier</key>
	<string>net.stuple.profile</string>
	<key>PayloadOrganization</key>
	<string>Stuple</string>
	<key>PayloadRemovalDisallowed</key>
	<false/>
	<key>PayloadScope</key>
	<string>System</string>
	<key>PayloadType</key>

	<key>PayloadUUID</key>
	<string>${mainUuid}</string>
	<key>PayloadVersion</key>
	<integer>1</integer>
</dict>
</plist>`;

    const blob = new Blob([profileXml], { type: 'application/x-apple-aspen-config' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `NextDNS-${decodeURIComponent(deviceName)}.mobileconfig`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
